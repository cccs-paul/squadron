spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false
  main:
    allow-bean-definition-overriding: true

squadron:
  security:
    jwt:
      jwks-uri: http://localhost:8081/api/auth/jwks
