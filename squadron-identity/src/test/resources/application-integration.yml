spring:
  datasource:
    url: jdbc:tc:postgresql:17:///squadron_identity_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://localhost/realms/test
          jwk-set-uri: https://localhost/realms/test/protocol/openid-connect/certs

squadron:
  nats:
    url: nats://localhost:4222
  security:
    jwt:
      jwks-uri: http://localhost:8081/api/auth/jwks
