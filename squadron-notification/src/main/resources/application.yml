server:
  port: 8089

spring:
  application:
    name: squadron-notification
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/squadron_notification}
    username: ${SPRING_DATASOURCE_USERNAME:squadron}
    password: ${SPRING_DATASOURCE_PASSWORD:squadron}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  # Keycloak JWT config retained as fallback; Squadron JWT is primary via squadron.security.jwt.jwks-uri
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron
  #         jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron/protocol/openid-connect/certs

squadron:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  security:
    jwt:
      jwks-uri: ${SQUADRON_JWKS_URI:http://localhost:8081/api/auth/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
