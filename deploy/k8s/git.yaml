apiVersion: v1
kind: ConfigMap
metadata:
  name: squadron-git-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: git
    app.kubernetes.io/part-of: squadron
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8087"
  SPRING_DATASOURCE_URL: jdbc:postgresql://squadron-postgresql:5432/squadron_git
  NATS_URL: nats://squadron-nats:4222
  WORKSPACE_BASE_PATH: /data/squadron/workspaces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-git
  namespace: squadron
  labels:
    app.kubernetes.io/name: git
    app.kubernetes.io/part-of: squadron
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: git
  template:
    metadata:
      labels:
        app.kubernetes.io/name: git
        app.kubernetes.io/part-of: squadron
    spec:
      serviceAccountName: squadron-git
      containers:
        - name: git
          image: squadron/git:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8087"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://squadron-postgresql:5432/squadron_git
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: password
            - name: NATS_URL
              value: nats://squadron-nats:4222
          envFrom:
            - configMapRef:
                name: squadron-git-config
          volumeMounts:
            - name: workspace-data
              mountPath: /data/squadron/workspaces
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: workspace-data
          persistentVolumeClaim:
            claimName: squadron-workspace-data
---
apiVersion: v1
kind: Service
metadata:
  name: squadron-git
  namespace: squadron
  labels:
    app.kubernetes.io/name: git
    app.kubernetes.io/part-of: squadron
spec:
  type: ClusterIP
  ports:
    - port: 8087
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: git
