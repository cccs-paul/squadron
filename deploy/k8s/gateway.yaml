apiVersion: v1
kind: ConfigMap
metadata:
  name: squadron-gateway-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: squadron
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8443"
  REDIS_HOST: squadron-redis
  REDIS_PORT: "6379"
  SQUADRON_IDENTITY_URL: http://squadron-identity:8081
  SQUADRON_CONFIG_URL: http://squadron-config:8082
  SQUADRON_ORCHESTRATOR_URL: http://squadron-orchestrator:8083
  SQUADRON_PLATFORM_URL: http://squadron-platform:8084
  SQUADRON_AGENT_URL: http://squadron-agent:8085
  SQUADRON_WORKSPACE_URL: http://squadron-workspace:8086
  SQUADRON_GIT_URL: http://squadron-git:8087
  SQUADRON_REVIEW_URL: http://squadron-review:8088
  SQUADRON_NOTIFICATION_URL: http://squadron-notification:8089
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-gateway
  namespace: squadron
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: squadron
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: squadron
    spec:
      serviceAccountName: squadron-gateway
      containers:
        - name: gateway
          image: squadron/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8443"
            - name: REDIS_HOST
              value: squadron-redis
            - name: REDIS_PORT
              value: "6379"
          envFrom:
            - configMapRef:
                name: squadron-gateway-config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: squadron-gateway
  namespace: squadron
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: squadron
spec:
  type: LoadBalancer
  ports:
    - port: 8443
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: gateway
