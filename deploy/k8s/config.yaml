apiVersion: v1
kind: ConfigMap
metadata:
  name: squadron-config-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: squadron
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8082"
  SPRING_DATASOURCE_URL: jdbc:postgresql://squadron-postgresql:5432/squadron_config
  NATS_URL: nats://squadron-nats:4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: squadron
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: config
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config
        app.kubernetes.io/part-of: squadron
    spec:
      serviceAccountName: squadron-config
      containers:
        - name: config
          image: squadron/config:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://squadron-postgresql:5432/squadron_config
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: password
            - name: NATS_URL
              value: nats://squadron-nats:4222
          envFrom:
            - configMapRef:
                name: squadron-config-config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: squadron-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: config
    app.kubernetes.io/part-of: squadron
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: config
