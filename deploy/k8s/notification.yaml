apiVersion: v1
kind: ConfigMap
metadata:
  name: squadron-notification-config
  namespace: squadron
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: squadron
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8089"
  SPRING_DATASOURCE_URL: jdbc:postgresql://squadron-postgresql:5432/squadron_notification
  NATS_URL: nats://squadron-nats:4222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-notification
  namespace: squadron
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: squadron
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
        app.kubernetes.io/part-of: squadron
    spec:
      serviceAccountName: squadron-notification
      containers:
        - name: notification
          image: squadron/notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8089
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8089"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://squadron-postgresql:5432/squadron_notification
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: password
            - name: NATS_URL
              value: nats://squadron-nats:4222
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: squadron-mail-credentials
                  key: host
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: squadron-mail-credentials
                  key: port
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: squadron-mail-credentials
                  key: username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-mail-credentials
                  key: password
          envFrom:
            - configMapRef:
                name: squadron-notification-config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: squadron-notification
  namespace: squadron
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: squadron
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: notification
