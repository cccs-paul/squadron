# =============================================================================
# Squadron - PostgreSQL 17 Production Tuning
#
# Tuned for 1000+ concurrent users accessing Squadron services.
# Assumes a dedicated server with 32 GB RAM, 8 CPU cores, SSD storage.
#
# Adjust values proportionally for different hardware configurations.
# See: https://www.postgresql.org/docs/17/runtime-config.html
# =============================================================================

# ---------------------------------------------------------------------------
# Connection Settings
# ---------------------------------------------------------------------------

# Maximum number of concurrent connections.
# With PgBouncer in front, PostgreSQL sees far fewer actual connections
# than application-level concurrency. PgBouncer handles multiplexing.
# Rule of thumb: (CPU cores * 2) + effective_spindle_count
# For SSD: ~20-40 connections is optimal for a single PG instance.
# Set higher to accommodate PgBouncer pool + admin/replication connections.
max_connections = 200

# Superuser reserved connections for maintenance access.
superuser_reserved_connections = 5

# ---------------------------------------------------------------------------
# Memory Settings
# ---------------------------------------------------------------------------

# Shared buffer cache — the most impactful PostgreSQL memory setting.
# Recommended: 25% of total system RAM.
# 32 GB system -> 8 GB shared_buffers.
shared_buffers = 8GB

# Memory per sort/hash operation per connection.
# With 200 max connections: 200 * 64MB = 12.8 GB worst case.
# Keep this moderate since PgBouncer limits real concurrent queries.
work_mem = 64MB

# Memory for maintenance operations (VACUUM, CREATE INDEX, ALTER TABLE).
# Can be set higher since these run infrequently.
maintenance_work_mem = 1GB

# Memory for autovacuum workers (separate from maintenance_work_mem).
autovacuum_work_mem = 512MB

# Effective cache size — hint to the query planner about how much memory
# is available for caching (OS page cache + shared_buffers).
# Typically 75% of total system RAM.
effective_cache_size = 24GB

# Huge pages — reduces TLB misses for large shared_buffers allocations.
# Requires OS-level huge pages configured (vm.nr_hugepages).
huge_pages = try

# Temp file limit per session (prevents runaway queries from filling disk).
temp_file_limit = 2GB

# ---------------------------------------------------------------------------
# WAL (Write-Ahead Log) Settings
# ---------------------------------------------------------------------------

# WAL level — 'replica' enables streaming replication and point-in-time recovery.
wal_level = replica

# Max WAL size before a checkpoint is triggered.
# Higher = less frequent checkpoints = better write performance.
max_wal_size = 4GB

# Minimum WAL size to retain.
min_wal_size = 1GB

# Number of WAL buffers (shared memory for WAL).
# Default is usually auto-tuned, but set explicitly for large systems.
wal_buffers = 64MB

# Checkpoint completion target — spread checkpoint I/O over this fraction
# of the checkpoint interval. Higher = smoother I/O, less spiky behavior.
checkpoint_completion_target = 0.9

# Checkpoint timeout — maximum time between automatic checkpoints.
checkpoint_timeout = 15min

# ---------------------------------------------------------------------------
# WAL Archiving (for point-in-time recovery)
# ---------------------------------------------------------------------------

# Enable WAL archiving for backup/PITR.
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# ---------------------------------------------------------------------------
# Replication Settings
# ---------------------------------------------------------------------------

# Maximum number of WAL sender processes (for streaming replication).
max_wal_senders = 5

# Keep enough WAL segments for replicas that might fall behind.
wal_keep_size = 2GB

# Maximum number of replication slots.
max_replication_slots = 5

# ---------------------------------------------------------------------------
# Query Planner Settings
# ---------------------------------------------------------------------------

# Random page cost — lower for SSD (default is 4.0 for spinning disks).
# SSD has near-identical random vs sequential read performance.
random_page_cost = 1.1

# Effective I/O concurrency — number of concurrent I/O operations the OS can handle.
# For SSD: 200. For spinning disks: 2.
effective_io_concurrency = 200

# Enable parallel query execution.
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Enable JIT compilation for complex queries.
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# ---------------------------------------------------------------------------
# Autovacuum Settings
# ---------------------------------------------------------------------------

# Autovacuum is critical — never disable it.
autovacuum = on

# Number of concurrent autovacuum workers.
autovacuum_max_workers = 4

# How often autovacuum checks for tables needing vacuuming (seconds).
autovacuum_naptime = 30s

# Thresholds for triggering autovacuum (lower = more aggressive = better for
# high-write workloads like Squadron's task state transitions).
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.02

# Cost-based vacuum delay — prevents vacuum from monopolizing I/O.
autovacuum_vacuum_cost_delay = 5ms
autovacuum_vacuum_cost_limit = 1000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log slow queries for performance analysis.
log_min_duration_statement = 500ms

# Log lock waits longer than 1 second.
log_lock_waits = on
deadlock_timeout = 1s

# Log all DDL statements.
log_statement = 'ddl'

# Log checkpoints for I/O tuning analysis.
log_checkpoints = on

# Log temporary file usage.
log_temp_files = 0

# Log auto-explain for slow queries.
# (Requires shared_preload_libraries = 'auto_explain')
# auto_explain.log_min_duration = 1000ms
# auto_explain.log_analyze = true

# ---------------------------------------------------------------------------
# Connection Timeouts
# ---------------------------------------------------------------------------

# Statement timeout — kill queries running longer than 5 minutes.
# Prevents runaway queries from blocking other operations.
statement_timeout = 300000    # 5 minutes in milliseconds

# Idle session timeout — close idle sessions after 30 minutes.
idle_in_transaction_session_timeout = 1800000  # 30 minutes

# Lock timeout — abort statements waiting for locks longer than 30 seconds.
lock_timeout = 30000          # 30 seconds

# ---------------------------------------------------------------------------
# Statistics & Monitoring
# ---------------------------------------------------------------------------

# Track I/O timing for EXPLAIN (ANALYZE, BUFFERS).
track_io_timing = on

# Track function call statistics.
track_functions = 'all'

# Track activity of each backend.
track_activity_query_size = 4096

# Shared preload libraries for monitoring.
# pg_stat_statements: query performance statistics
# auto_explain: automatic EXPLAIN for slow queries
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements settings.
pg_stat_statements.max = 10000
pg_stat_statements.track = 'all'

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

# SSL — enable for all connections.
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'
ssl_min_protocol_version = 'TLSv1.3'

# Password encryption method.
password_encryption = 'scram-sha-256'

# ---------------------------------------------------------------------------
# Resource Limits
# ---------------------------------------------------------------------------

# Maximum number of locks per transaction.
max_locks_per_transaction = 256

# Maximum number of predicate locks per transaction.
max_pred_locks_per_transaction = 128
