; =============================================================================
; Squadron - PgBouncer Production Configuration
;
; Tuned for 1000+ concurrent application connections (10 Squadron services,
; each with multiple instances). PgBouncer multiplexes these down to a much
; smaller number of real PostgreSQL connections.
;
; Transaction pooling is used: connections are returned to the pool after each
; transaction, enabling high concurrency with minimal PostgreSQL connections.
;
; See: https://www.pgbouncer.org/config.html
; =============================================================================

[databases]

; Database connection strings.
; PgBouncer connects to PostgreSQL on behalf of clients.
; Each Squadron service has its own database (database-per-service pattern).

squadron_identity     = host=postgres port=5432 dbname=squadron_identity
squadron_config       = host=postgres port=5432 dbname=squadron_config
squadron_orchestrator = host=postgres port=5432 dbname=squadron_orchestrator
squadron_platform     = host=postgres port=5432 dbname=squadron_platform
squadron_agent        = host=postgres port=5432 dbname=squadron_agent
squadron_workspace    = host=postgres port=5432 dbname=squadron_workspace
squadron_git          = host=postgres port=5432 dbname=squadron_git
squadron_review       = host=postgres port=5432 dbname=squadron_review
squadron_notification = host=postgres port=5432 dbname=squadron_notification

; Wildcard fallback (allows any database name to pass through).
; Disable in production if you want strict database allowlisting.
; * = host=postgres port=5432

[pgbouncer]

; ---------------------------------------------------------------------------
; Pool Mode
; ---------------------------------------------------------------------------

; Transaction pooling: connections are returned to the pool after each
; transaction completes. This is the most efficient mode for web applications
; and microservices. Session-level features (SET, LISTEN, advisory locks)
; are NOT supported in this mode.
pool_mode = transaction

; ---------------------------------------------------------------------------
; Connection Limits
; ---------------------------------------------------------------------------

; Maximum number of client connections PgBouncer will accept.
; This should be set very high since PgBouncer is extremely efficient
; at handling idle connections (minimal memory per connection).
; 1000+ concurrent Squadron users × multiple services × connection pool overhead.
max_client_conn = 5000

; Default pool size per database/user pair.
; This is the number of real PostgreSQL connections maintained per pool.
; 10 services × 20 connections = 200 total, well within PG max_connections=200.
default_pool_size = 20

; Minimum pool size — keep this many connections open even when idle.
; Avoids connection establishment latency for the first requests.
min_pool_size = 5

; Reserve pool — extra connections available during traffic spikes.
; These are only used when all default_pool connections are busy and
; clients have been waiting longer than reserve_pool_timeout.
reserve_pool_size = 10

; How long a client must wait before a reserve pool connection is used (seconds).
reserve_pool_timeout = 3

; Maximum number of connections per database (across all users).
; Prevents a single database from monopolizing all PostgreSQL connections.
max_db_connections = 50

; Maximum number of connections per user (across all databases).
max_user_connections = 100

; ---------------------------------------------------------------------------
; Timeouts
; ---------------------------------------------------------------------------

; Server connection lifetime — close server connections after this many seconds.
; Prevents holding stale connections indefinitely. Re-creation is transparent.
server_lifetime = 3600

; Server idle timeout — close idle server connections after this many seconds.
; Frees PostgreSQL connection slots when traffic is low.
server_idle_timeout = 600

; Client idle timeout — close idle client connections after this many seconds.
; Services should reconnect automatically via HikariCP.
client_idle_timeout = 600

; Client login timeout — how long to wait for a client to authenticate.
client_login_timeout = 60

; Query timeout — kill queries running longer than this (seconds).
; Set to 0 to disable (PostgreSQL's statement_timeout is the primary guard).
query_timeout = 0

; Query wait timeout — how long a client query can wait for a server
; connection from the pool. If exceeded, the client gets an error.
query_wait_timeout = 120

; Cancel wait timeout — how long to wait for query cancel to finish.
cancel_wait_timeout = 10

; Server connect timeout — how long to wait when connecting to PostgreSQL.
server_connect_timeout = 15

; ---------------------------------------------------------------------------
; Logging
; ---------------------------------------------------------------------------

; Log connections and disconnections.
log_connections = 1
log_disconnections = 1

; Log pooler errors (e.g., pool exhaustion).
log_pooler_errors = 1

; Statistics period — how often to log pool statistics (seconds).
stats_period = 60

; Verbose logging (0=off, 1=on). Enable only for debugging.
verbose = 0

; ---------------------------------------------------------------------------
; Authentication
; ---------------------------------------------------------------------------

; Authentication type.
; 'hba' uses pg_hba.conf-style rules, 'md5' requires auth_file,
; 'scram-sha-256' is the most secure.
auth_type = scram-sha-256

; Authentication file — maps usernames to hashed passwords.
; Generate with: mkpasswd or pgbouncer's own auth_query mechanism.
auth_file = /etc/pgbouncer/userlist.txt

; Authentication query — alternative to auth_file.
; PgBouncer queries PostgreSQL for user credentials.
; auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ---------------------------------------------------------------------------
; TLS / SSL
; ---------------------------------------------------------------------------

; Client-facing TLS (PgBouncer <-> Squadron services).
client_tls_sslmode = prefer
client_tls_key_file = /etc/pgbouncer/tls/server.key
client_tls_cert_file = /etc/pgbouncer/tls/server.crt
client_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; Server-facing TLS (PgBouncer <-> PostgreSQL).
server_tls_sslmode = prefer
server_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; ---------------------------------------------------------------------------
; Admin / Monitoring
; ---------------------------------------------------------------------------

; Listen address and port.
listen_addr = 0.0.0.0
listen_port = 6432

; Admin users — can run SHOW commands via the PgBouncer admin console.
admin_users = squadron_admin

; Stats users — can run read-only SHOW commands.
stats_users = squadron_monitor, squadron_admin

; Unix socket directory (disable if not needed).
; unix_socket_dir = /var/run/pgbouncer

; ---------------------------------------------------------------------------
; Performance Tuning
; ---------------------------------------------------------------------------

; TCP keepalive settings (seconds). Detect dead connections quickly.
tcp_keepalive = 1
tcp_keepcnt = 3
tcp_keepidle = 30
tcp_keepintvl = 10

; Disable TCP Nagle algorithm for lower latency.
tcp_socket_buffer = 0

; Use SO_REUSEPORT for better connection distribution across processes.
so_reuseport = 1

; Maximum packet size. Default 2048 is fine for most workloads.
pkt_buf = 4096

; Number of event loop backend (applies to multi-threaded builds).
; sbuf_loopcnt = 5

; Application name prefix added to server connections for monitoring.
application_name_add_host = 1

; ---------------------------------------------------------------------------
; Process Settings
; ---------------------------------------------------------------------------

; Run as this user.
; user = pgbouncer

; PID file location.
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Log file (or use syslog).
; logfile = /var/log/pgbouncer/pgbouncer.log
