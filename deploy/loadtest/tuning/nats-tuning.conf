# =============================================================================
# Squadron - NATS Server Production Configuration
#
# Tuned for high throughput event streaming with JetStream persistence.
# Squadron uses NATS for inter-service async communication including:
#   - Task state change events
#   - Agent invocation and completion events
#   - Workspace lifecycle events
#   - Review update events
#   - Notification delivery requests
#
# See: https://docs.nats.io/running-a-nats-service/configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Server Identity
# ---------------------------------------------------------------------------

server_name: "squadron-nats-1"

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------

# Client connection port.
port: 4222

# Monitoring HTTP port (Prometheus scraping, health checks).
http_port: 8222

# Listen on all interfaces.
host: "0.0.0.0"

# Maximum number of client connections.
# 10 Squadron services × multiple instances × connection overhead.
max_connections: 10000

# Maximum control line size (header).
max_control_line: 4096

# Maximum payload size per message (bytes).
# Squadron events are typically JSON < 64 KB, but agent outputs can be larger.
max_payload: 1048576  # 1 MB

# Write deadline — how long the server waits for a slow consumer to accept data.
write_deadline: "10s"

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------

# For production, use NKey or JWT-based authentication.
# Below is a simple token-based auth for reference; replace with NKeys in production.

# authorization {
#   token: "squadron-nats-secret-change-in-production"
# }

# NKey-based authentication (production recommended):
# authorization {
#   users = [
#     { nkey: "UAKEY...", permissions: { publish: ">", subscribe: ">" } }
#   ]
# }

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------

# Enable TLS for all client connections.
# tls {
#   cert_file: "/etc/nats/tls/server.crt"
#   key_file: "/etc/nats/tls/server.key"
#   ca_file: "/etc/nats/tls/ca.crt"
#   verify: true                       # Require client certificates (mTLS)
#   timeout: 5                          # TLS handshake timeout (seconds)
#   cipher_suites: [
#     "TLS_AES_256_GCM_SHA384",
#     "TLS_CHACHA20_POLY1305_SHA256",
#     "TLS_AES_128_GCM_SHA256"
#   ]
#   min_version: "1.3"
# }

# ---------------------------------------------------------------------------
# JetStream — Persistent Messaging
# ---------------------------------------------------------------------------

jetstream {
  # Storage directory for JetStream data (streams, consumers).
  store_dir: "/data/jetstream"

  # Maximum memory storage for JetStream (in-memory streams/consumers).
  # Used for high-speed ephemeral streams.
  max_mem_store: 2GB

  # Maximum file storage for JetStream (persistent streams).
  # Set based on available disk. Includes all stream data + WAL.
  max_file_store: 50GB

  # Maximum outstanding ack-pending messages across all consumers.
  # Higher = more in-flight messages = higher throughput.
  max_outstanding_catchup: 64MB
}

# ---------------------------------------------------------------------------
# Clustering
# ---------------------------------------------------------------------------

# For high availability, run a 3-node NATS cluster.
# Uncomment and configure for multi-node deployments.

# cluster {
#   name: "squadron-cluster"
#   listen: "0.0.0.0:6222"
#
#   routes = [
#     "nats-route://squadron-nats-2:6222"
#     "nats-route://squadron-nats-3:6222"
#   ]
#
#   # Cluster TLS
#   tls {
#     cert_file: "/etc/nats/tls/cluster.crt"
#     key_file: "/etc/nats/tls/cluster.key"
#     ca_file: "/etc/nats/tls/ca.crt"
#     verify: true
#   }
# }

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Log to stdout (for container environments).
# Log file: uncomment for file-based logging.
# logfile: "/var/log/nats/nats.log"

# Log severity: trace, debug, info, warn, error, fatal.
# Use "info" in production; "debug" for troubleshooting.
debug: false
trace: false
logtime: true

# Log size limit for file-based logging (bytes).
# logfile_size_limit: 104857600  # 100 MB

# ---------------------------------------------------------------------------
# Slow Consumer Handling
# ---------------------------------------------------------------------------

# Maximum number of pending messages for a subscription before the
# server considers it a slow consumer and drops messages.
max_pending: 67108864  # 64 MB

# Slow consumer handling: when a consumer can't keep up, NATS can either
# drop messages or disconnect the client. The pending limit above controls
# the buffer before action is taken.

# ---------------------------------------------------------------------------
# Ping / Keepalive
# ---------------------------------------------------------------------------

# Server sends PING to clients at this interval (seconds).
ping_interval: 30

# Maximum number of unanswered PINGs before the client is considered dead.
ping_max: 3

# ---------------------------------------------------------------------------
# Monitoring Endpoints
# ---------------------------------------------------------------------------

# HTTP monitoring is enabled via http_port above.
# Available endpoints:
#   GET /varz      — General server information
#   GET /connz     — Connection information
#   GET /routez    — Route information (clustering)
#   GET /subsz     — Subscription information
#   GET /jsz       — JetStream information
#   GET /healthz   — Health check

# ---------------------------------------------------------------------------
# System Account (for monitoring/admin)
# ---------------------------------------------------------------------------

# The system account receives internal NATS events (slow consumers,
# authentication failures, etc.). Useful for monitoring.
# system_account: "SYS"

# ---------------------------------------------------------------------------
# Resource Limits per Account
# ---------------------------------------------------------------------------

# Default account limits (applies when not using multi-account).
# accounts {
#   squadron {
#     jetstream: enabled
#     users = [
#       { user: "squadron", password: "change-in-production" }
#     ]
#     limits {
#       max_connections: 5000
#       max_subscriptions: 50000
#       max_payload: 1048576
#       max_leafnodes: 10
#     }
#   }
# }

# ---------------------------------------------------------------------------
# Leaf Nodes (for edge/remote deployments)
# ---------------------------------------------------------------------------

# Leaf nodes connect satellite NATS servers to the main cluster.
# Useful for air-gapped or edge deployments.

# leafnodes {
#   listen: "0.0.0.0:7422"
#   tls {
#     cert_file: "/etc/nats/tls/leafnode.crt"
#     key_file: "/etc/nats/tls/leafnode.key"
#     ca_file: "/etc/nats/tls/ca.crt"
#     verify: true
#   }
# }
