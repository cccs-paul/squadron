apiVersion: v2
name: squadron
description: Squadron - AI-powered software development workflow platform
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: squadron-gateway
    version: 0.1.0
    repository: "file://charts/gateway"
    condition: gateway.enabled
  - name: squadron-identity
    version: 0.1.0
    repository: "file://charts/identity"
    condition: identity.enabled
  - name: squadron-config
    version: 0.1.0
    repository: "file://charts/config"
    condition: config.enabled
  - name: squadron-orchestrator
    version: 0.1.0
    repository: "file://charts/orchestrator"
    condition: orchestrator.enabled
  - name: squadron-platform
    version: 0.1.0
    repository: "file://charts/platform"
    condition: platform.enabled
  - name: squadron-agent
    version: 0.1.0
    repository: "file://charts/agent"
    condition: agent.enabled
  - name: squadron-workspace
    version: 0.1.0
    repository: "file://charts/workspace"
    condition: workspace.enabled
  - name: squadron-git
    version: 0.1.0
    repository: "file://charts/git"
    condition: git.enabled
  - name: squadron-review
    version: 0.1.0
    repository: "file://charts/review"
    condition: review.enabled
  - name: squadron-notification
    version: 0.1.0
    repository: "file://charts/notification"
    condition: notification.enabled
  - name: squadron-ui
    version: 0.1.0
    repository: "file://charts/ui"
    condition: ui.enabled
  - name: squadron-postgresql
    version: 0.1.0
    repository: "file://charts/postgresql"
    condition: postgresql.enabled
  - name: squadron-redis
    version: 0.1.0
    repository: "file://charts/redis"
    condition: redis.enabled
  - name: squadron-nats
    version: 0.1.0
    repository: "file://charts/nats"
    condition: nats.enabled
  - name: squadron-keycloak
    version: 0.1.0
    repository: "file://charts/keycloak"
    condition: keycloak.enabled
