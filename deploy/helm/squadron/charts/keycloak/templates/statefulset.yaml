apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "squadron-keycloak.fullname" . }}
  labels:
    {{- include "squadron-keycloak.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "squadron-keycloak.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "squadron-keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squadron-keycloak.labels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - start-dev
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KC_DB
              value: {{ .Values.database.vendor | quote }}
            - name: KC_DB_URL
              value: {{ .Values.database.url | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: KC_DB_PASSWORD
              value: {{ .Values.database.password | quote }}
            - name: KC_HOSTNAME_STRICT
              value: {{ .Values.hostname.strict | quote }}
            {{- if .Values.hostname.url }}
            - name: KC_HOSTNAME
              value: {{ .Values.hostname.url | quote }}
            {{- end }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: {{ .Values.proxy.headers | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.auth.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.auth.adminPassword | quote }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
