image:
  repository: quay.io/keycloak/keycloak
  tag: "26.0.5"
  pullPolicy: IfNotPresent

auth:
  adminUser: admin
  adminPassword: admin

database:
  vendor: postgres
  url: jdbc:postgresql://squadron-postgresql:5432/keycloak
  username: squadron
  password: squadron

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080

hostname:
  strict: "false"
  url: ""

proxy:
  headers: xforwarded

nodeSelector: {}
tolerations: []
affinity: {}
