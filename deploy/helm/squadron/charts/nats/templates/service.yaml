apiVersion: v1
kind: Service
metadata:
  name: {{ include "squadron-nats.fullname" . }}
  labels:
    {{- include "squadron-nats.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.clientPort }}
      targetPort: client
      protocol: TCP
      name: client
    - port: {{ .Values.service.monitorPort }}
      targetPort: monitor
      protocol: TCP
      name: monitor
  selector:
    {{- include "squadron-nats.selectorLabels" . | nindent 4 }}
