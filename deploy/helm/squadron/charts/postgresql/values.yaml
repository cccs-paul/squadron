image:
  repository: postgres
  tag: "17-alpine"
  pullPolicy: IfNotPresent

auth:
  username: squadron
  password: squadron
  database: squadron

persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 5432

initDatabases:
  - squadron_identity
  - squadron_config
  - squadron_orchestrator
  - squadron_platform
  - squadron_agent
  - squadron_workspace
  - squadron_git
  - squadron_review
  - squadron_notification

nodeSelector: {}
tolerations: []
affinity: {}
