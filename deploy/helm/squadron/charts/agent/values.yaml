replicaCount: 2

image:
  repository: squadron/squadron-agent
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8085

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: squadron.local
      paths:
        - path: /api/agent
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

env:
  SPRING_PROFILES_ACTIVE: kubernetes
  SERVER_PORT: "8085"
  NATS_URL: nats://squadron-nats:4222
  SPRING_DATASOURCE_URL: jdbc:postgresql://squadron-postgresql:5432/squadron_agent
  SPRING_DATASOURCE_USERNAME: squadron
  SPRING_DATASOURCE_PASSWORD: squadron
  OPENAI_BASE_URL: https://api.openai.com
  OPENAI_MODEL: gpt-4o
  SPRING_AI_OLLAMA_BASE_URL: http://squadron-ollama:11434
  SPRING_AI_OLLAMA_CHAT_MODEL: qwen2.5-coder:7b

secretEnv:
  OPENAI_API_KEY:
    secretName: squadron-agent-secrets
    key: openai-api-key

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5

nodeSelector: {}
tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - squadron-agent
          topologyKey: kubernetes.io/hostname
