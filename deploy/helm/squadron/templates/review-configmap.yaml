{{- if .Values.review.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: squadron-review-config
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "review") | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: {{ .Values.review.port | quote }}
  SPRING_DATASOURCE_URL: {{ include "squadron.jdbcUrl" (dict "dbName" .Values.review.database.name) }}
  NATS_URL: nats://squadron-nats:4222
  SQUADRON_GIT_URL: http://squadron-git:8087
{{- end }}
