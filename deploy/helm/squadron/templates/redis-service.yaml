{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-redis
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "redis") | nindent 4 }}
{{- end }}
