{{- if .Values.platform.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-platform
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "platform") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.platform.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "platform") | nindent 4 }}
{{- end }}
