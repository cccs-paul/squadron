{{- if .Values.orchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-orchestrator
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "orchestrator") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.orchestrator.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "orchestrator") | nindent 4 }}
{{- end }}
