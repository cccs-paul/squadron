{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-nats
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "nats") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4222
      targetPort: client
      protocol: TCP
      name: client
    - port: 8222
      targetPort: monitoring
      protocol: TCP
      name: monitoring
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "nats") | nindent 4 }}
{{- end }}
