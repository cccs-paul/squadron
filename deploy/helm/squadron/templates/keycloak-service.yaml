{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-keycloak
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "keycloak") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "keycloak") | nindent 4 }}
{{- end }}
