{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: squadron-postgresql
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "postgresql") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "squadron.selectorLabels" (dict "root" . "service" "postgresql") | nindent 4 }}
{{- end }}
