{{- if .Values.nats.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-nats
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "nats") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "squadron.selectorLabels" (dict "root" . "service" "nats") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squadron.serviceLabels" (dict "root" . "service" "nats") | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          {{- if .Values.nats.jetstream.enabled }}
          args:
            - "-js"
            - "--store_dir"
            - "/data"
            - "-m"
            - "8222"
          {{- end }}
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: monitoring
              containerPort: 8222
              protocol: TCP
          {{- if .Values.nats.jetstream.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitoring
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitoring
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
      {{- if .Values.nats.jetstream.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: squadron-nats-data
      {{- end }}
{{- if .Values.nats.jetstream.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: squadron-nats-data
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "nats") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.nats.jetstream.storage }}
{{- end }}
{{- end }}
