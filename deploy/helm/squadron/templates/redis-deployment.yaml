{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-redis
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "redis") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "squadron.selectorLabels" (dict "root" . "service" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squadron.serviceLabels" (dict "root" . "service" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: squadron-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: squadron-redis-data
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "redis") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.storage }}
{{- end }}
