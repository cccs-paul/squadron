{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squadron-keycloak
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "keycloak") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "squadron.selectorLabels" (dict "root" . "service" "keycloak") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "squadron.serviceLabels" (dict "root" . "service" "keycloak") | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args:
            - start
            - --hostname-strict=false
            - --http-enabled=true
            - --proxy-headers=xforwarded
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://squadron-postgresql:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-postgresql-credentials
                  key: password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: squadron-keycloak-credentials
                  key: admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: squadron-keycloak-credentials
                  key: admin-password
            - name: KC_HEALTH_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: squadron-keycloak-credentials
  namespace: {{ include "squadron.namespace" . }}
  labels:
    {{- include "squadron.serviceLabels" (dict "root" . "service" "keycloak") | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.keycloak.adminUser }}
  admin-password: {{ .Values.keycloak.adminPassword }}
{{- end }}
