  database:
    name: squadron_workspace
  env: {}

# ---------------------------------------------------------------------------
# Service: git
# ---------------------------------------------------------------------------
git:
  enabled: true
  replicas: 2
  image:
    repository: squadron/git
    tag: latest
    pullPolicy: IfNotPresent
  port: 8087
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_git
  env: {}

# ---------------------------------------------------------------------------
# Service: review
# ---------------------------------------------------------------------------
review:
  enabled: true
  replicas: 2
  image:
    repository: squadron/review
    tag: latest
    pullPolicy: IfNotPresent
  port: 8088
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_review
  env: {}

# ---------------------------------------------------------------------------
# Service: notification
# ---------------------------------------------------------------------------
notification:
  enabled: true
  replicas: 2
  image:
    repository: squadron/notification
    tag: latest
    pullPolicy: IfNotPresent
  port: 8089
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_notification
  env: {}

# ---------------------------------------------------------------------------
# Infrastructure: PostgreSQL
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image: postgres:17
  storage: 50Gi
  username: squadron
  password: squadron
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

# ---------------------------------------------------------------------------
# Infrastructure: NATS
# ---------------------------------------------------------------------------
nats:
  enabled: true
  image: nats:latest
  jetstream:
    enabled: true
    storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Infrastructure: Redis
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image: redis:7
  storage: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Infrastructure: Keycloak
# ---------------------------------------------------------------------------
keycloak:
  enabled: true
  image: quay.io/keycloak/keycloak:26.0
  adminUser: admin
  adminPassword: admin
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    path: /actuator/prometheus
