  enabled: true
  replicas: 2
  image:
    repository: squadron/platform
    tag: latest
    pullPolicy: IfNotPresent
  port: 8084
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_platform
  env: {}

# ---------------------------------------------------------------------------
# Service: agent
# ---------------------------------------------------------------------------
