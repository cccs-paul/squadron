##
## Squadron Platform - Helm Values
##

global:
  namespace: squadron
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ---------------------------------------------------------------------------
# Service: gateway
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  replicas: 2
  image:
    repository: squadron/gateway
    tag: latest
    pullPolicy: IfNotPresent
  port: 8443
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  env: {}

# ---------------------------------------------------------------------------
# Service: identity
# ---------------------------------------------------------------------------
identity:
  enabled: true
  replicas: 2
  image:
    repository: squadron/identity
    tag: latest
    pullPolicy: IfNotPresent
  port: 8081
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_identity
  env: {}

# ---------------------------------------------------------------------------
# Service: config
# ---------------------------------------------------------------------------
config:
  enabled: true
  replicas: 2
  image:
    repository: squadron/config
    tag: latest
    pullPolicy: IfNotPresent
  port: 8082
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  database:
    name: squadron_config
  env: {}

# ---------------------------------------------------------------------------
# Service: orchestrator
# ---------------------------------------------------------------------------
