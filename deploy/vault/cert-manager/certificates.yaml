# =============================================================================
# Squadron - cert-manager Certificate Resources
# =============================================================================
# Defines Certificate resources for each Squadron service. cert-manager will
# automatically request certificates from Vault via the ClusterIssuer and
# store them as Kubernetes Secrets that pods mount as volumes.
#
# Each certificate includes:
#   - Service DNS name (short, namespace-qualified, and FQDN)
#   - EC P-256 key for performance
#   - 720h (30 day) duration with 480h (20 day) renewal window
#   - Stored in a TLS Secret mounted by the service pod
#
# Usage:
#   kubectl apply -f deploy/vault/cert-manager/certificates.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Gateway
# ---------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: squadron-gateway-tls
  namespace: squadron
  labels:
    app.kubernetes.io/name: squadron-gateway
    app.kubernetes.io/component: tls
spec:
  secretName: squadron-gateway-tls
  issuerRef:
    name: squadron-vault-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: squadron-gateway
  duration: 720h    # 30 days
  renewBefore: 480h # Renew 20 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  dnsNames:
    - squadron-gateway
    - squadron-gateway.squadron
    - squadron-gateway.squadron.svc
    - squadron-gateway.squadron.svc.cluster.local
  ipAddresses:
    - 127.0.0.1

---
