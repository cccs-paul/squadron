# =============================================================================
# Squadron - Spring Boot mTLS Application Properties Template
# =============================================================================
# This file documents the Spring Boot properties needed to enable mTLS for
# Squadron services. These properties are set via environment variables in
# the Kubernetes deployment (see values-mtls.yaml).
#
# For local development, use the generate-dev-certs.sh script to create
# self-signed certificates, then apply these properties.
#
# Spring Boot 3.x uses PEM-format keystores directly (no PKCS12 conversion).
# =============================================================================

# ---------------------------------------------------------------------------
# Server TLS Configuration (Embedded Tomcat)
# ---------------------------------------------------------------------------
# Enable HTTPS on the embedded Tomcat server
server.ssl.enabled=true

# Use PEM-encoded certificates (Spring Boot 3.1+ feature)
server.ssl.key-store-type=PEM

# Path to the PEM-encoded certificate chain (server cert + intermediates)
server.ssl.key-store=/etc/tls/tls.crt

# Path to the PEM-encoded private key
server.ssl.key-store-key=/etc/tls/tls.key

# Trust store containing the CA certificate chain (for verifying client certs)
server.ssl.trust-store-type=PEM
server.ssl.trust-store=/etc/tls/ca.crt

# Require client certificate authentication (mTLS)
# Options: none, want, need
#   none - no client cert required (plain TLS)
#   want - request client cert but don't fail if missing
#   need - require valid client cert (full mTLS)
server.ssl.client-auth=need

# TLS protocol version (TLS 1.3 preferred, 1.2 as fallback)
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.3,TLSv1.2

# Cipher suites (TLS 1.3 ciphers are always included automatically)
# These are for TLS 1.2 fallback connections
server.ssl.ciphers=TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256

# ---------------------------------------------------------------------------
# RestClient / WebClient TLS Configuration (for outbound calls)
# ---------------------------------------------------------------------------
# Spring Boot 3.x auto-configures RestClient SSL bundles from the server
# SSL configuration. For explicit control, define SSL bundles:
#
# spring.ssl.bundle.pem.squadron.keystore.certificate=/etc/tls/tls.crt
# spring.ssl.bundle.pem.squadron.keystore.private-key=/etc/tls/tls.key
# spring.ssl.bundle.pem.squadron.truststore.certificate=/etc/tls/ca.crt

# ---------------------------------------------------------------------------
# PostgreSQL TLS
# ---------------------------------------------------------------------------
# Add SSL parameters to the JDBC URL
# spring.datasource.url=jdbc:postgresql://squadron-postgresql:5432/squadron_<service>?sslmode=verify-full&sslrootcert=/etc/tls/ca.crt&sslcert=/etc/tls/tls.crt&sslkey=/etc/tls/tls.key

# ---------------------------------------------------------------------------
# Redis TLS
# ---------------------------------------------------------------------------
spring.data.redis.ssl.enabled=true
# spring.data.redis.ssl.bundle=squadron  # Use SSL bundle defined above

# ---------------------------------------------------------------------------
# NATS TLS
# ---------------------------------------------------------------------------
# NATS URL should use tls:// scheme
# nats.url=tls://squadron-nats:4222
# NATS client will use the JVM trust store by default.
# For custom CA: set javax.net.ssl.trustStore system property

# ---------------------------------------------------------------------------
# Actuator / Management Endpoints
# ---------------------------------------------------------------------------
# Health endpoints should remain accessible for K8s probes.
# Option 1: Run management on a separate non-TLS port
# management.server.port=8090
# management.server.ssl.enabled=false
#
# Option 2: Keep on same port with TLS (requires K8s probes to use HTTPS)
# This is the recommended approach for full mTLS.
management.server.ssl.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
