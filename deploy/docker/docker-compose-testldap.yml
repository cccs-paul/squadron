# Squadron - Docker Compose Test LDAP Overlay
#
# Extends the main docker-compose.yml to add a test OpenLDAP server
# using the rroemhild/docker-test-openldap image.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose-testldap.yml up -d
#
# LDAP ports:
#   LDAP:  10389
#   LDAPS: 10636
#
# Domain: dc=planetexpress,dc=com
# Admin DN: cn=admin,dc=planetexpress,dc=com
# Admin Password: GoodNewsEveryone
#
# Test users (uid / password):
#   professor / professor
#   fry / fry
#   leela / leela
#   bender / bender
#   zoidberg / zoidberg
#   hermes / hermes
#   amy / amy

services:
  openldap-test:
    image: ghcr.io/rroemhild/docker-test-openldap:master
    container_name: squadron-openldap-test
    restart: "no"
    ports:
      - "10389:10389"
      - "10636:10636"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -H ldap://localhost:10389 -x -b 'dc=planetexpress,dc=com' -D 'cn=admin,dc=planetexpress,dc=com' -w GoodNewsEveryone '(objectClass=organization)' dn 2>&1 | grep -q 'planetexpress'"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    networks:
      - squadron-net
