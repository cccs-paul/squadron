server:
  port: 8087

spring:
  application:
    name: squadron-git
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/squadron_git}
    username: ${SPRING_DATASOURCE_USERNAME:squadron}
    password: ${SPRING_DATASOURCE_PASSWORD:squadron}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Keycloak JWT config retained as fallback; Squadron JWT is primary via squadron.security.jwt.jwks-uri
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron
  #         jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron/protocol/openid-connect/certs

squadron:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  security:
    jwt:
      jwks-uri: ${SQUADRON_JWKS_URI:http://localhost:8081/api/auth/jwks}
  workspace:
    base-path: ${WORKSPACE_BASE_PATH:/tmp/squadron/workspaces}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
