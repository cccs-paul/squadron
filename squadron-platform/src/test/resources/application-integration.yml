spring:
  datasource:
    url: jdbc:tc:postgresql:17:///squadron_platform_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/auth/jwks

squadron:
  security:
    encryption-key: test-encryption-key-32chars!!
    jwt:
      jwks-uri: http://localhost:8081/api/auth/jwks
