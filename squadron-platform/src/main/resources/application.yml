server:
  port: 8084

spring:
  application:
    name: squadron-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/squadron_platform}
    username: ${SPRING_DATASOURCE_USERNAME:squadron}
    password: ${SPRING_DATASOURCE_PASSWORD:squadron}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
squadron:
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  security:
    encryption-key: ${SQUADRON_ENCRYPTION_KEY:}
    jwt:
      jwks-uri: ${SQUADRON_JWKS_URI:http://localhost:8081/api/auth/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
