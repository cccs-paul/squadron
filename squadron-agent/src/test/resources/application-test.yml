spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://localhost/realms/test
          jwk-set-uri: https://localhost/realms/test/protocol/openid-connect/certs
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key
    ollama:
      base-url: http://localhost:11434
      init:
        timeout: 0s
        pull-model-strategy: never

squadron:
  security:
    jwt:
      jwks-uri: http://localhost:8081/api/auth/jwks
