server:
  port: 8085

spring:
  application:
    name: squadron-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/squadron_agent}
    username: ${SPRING_DATASOURCE_USERNAME:squadron}
    password: ${SPRING_DATASOURCE_PASSWORD:squadron}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Keycloak JWT config retained as fallback; Squadron JWT is primary via squadron.security.jwt.jwks-uri
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron
  #         jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/squadron/protocol/openid-connect/certs
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5-coder:7b}
          temperature: 0.1
          num-predict: 4096

squadron:
  agents:
    max-per-user: ${SQUADRON_MAX_AGENTS_PER_USER:8}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  orchestrator:
    url: ${ORCHESTRATOR_URL:http://localhost:8083}
  git:
    url: ${GIT_SERVICE_URL:http://localhost:8086}
  review:
    url: ${REVIEW_SERVICE_URL:http://localhost:8088}
  workspace:
    url: ${WORKSPACE_SERVICE_URL:http://localhost:8087}
  security:
    jwt:
      jwks-uri: ${SQUADRON_JWKS_URI:http://localhost:8081/api/auth/jwks}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
