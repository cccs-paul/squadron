<div class="notification-bell" (click)="$event.stopPropagation()">
  <button class="bell-btn" (click)="toggleDropdown()" aria-label="Notifications">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    @if (unreadCount() > 0) {
      <span class="badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
    }
  </button>

  @if (dropdownOpen) {
    <div class="dropdown">
      <div class="dropdown__header">
        <h4>Notifications</h4>
        @if (unreadCount() > 0) {
          <button class="mark-all" (click)="markAllAsRead()">Mark all read</button>
        }
      </div>
      <div class="dropdown__list">
        @for (notification of notifications(); track notification.id) {
          <div class="notification-item" [class.notification-item--unread]="!notification.read" (click)="markAsRead(notification.id)">
            <div class="notification-item__dot" [class.notification-item__dot--visible]="!notification.read"></div>
            <div class="notification-item__content">
              <p class="notification-item__title">{{ notification.title }}</p>
              <p class="notification-item__message">{{ notification.message | truncate:80 }}</p>
              <span class="notification-item__time">{{ notification.createdAt | timeAgo }}</span>
            </div>
          </div>
        } @empty {
          <div class="dropdown__empty">
            <p>No notifications</p>
          </div>
        }
      </div>
    </div>
  }
</div>
