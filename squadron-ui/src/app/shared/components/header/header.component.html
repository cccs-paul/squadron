<header class="header">
  <div class="header__left">
    <button class="header__menu-toggle" (click)="menuToggle.emit()" [attr.aria-label]="'header.toggleSidebar' | translate">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header__search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" [placeholder]="'header.searchPlaceholder' | translate" class="header__search-input" />
    </div>
  </div>

  <div class="header__right">
    <sq-notification-bell />

    <!-- Language Switcher -->
    <div class="header__lang-switcher" (click)="toggleLangMenu(); $event.stopPropagation()">
      <button class="header__lang-btn" [attr.aria-label]="'language.label' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span class="header__lang-code">{{ i18n.currentLangFlag() }}</span>
      </button>

      @if (langMenuOpen) {
        <div class="lang-menu">
          @for (lang of i18n.supportedLanguages; track lang.code) {
            <button
              class="lang-menu__item"
              [class.lang-menu__item--active]="i18n.currentLang() === lang.code"
              (click)="switchLang(lang.code); $event.stopPropagation()"
            >
              <span class="lang-menu__flag">{{ lang.flag }}</span>
              <span>{{ lang.label }}</span>
            </button>
          }
        </div>
      }
    </div>

    <div class="header__profile" (click)="toggleProfileMenu(); $event.stopPropagation()">
      <sq-avatar [name]="user()?.displayName ?? ''" [src]="user()?.avatarUrl" [size]="32" />
      <div class="header__profile-info">
        <span class="header__profile-name">{{ user()?.displayName }}</span>
        <span class="header__profile-tenant">{{ user()?.tenantName }}</span>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      @if (profileMenuOpen) {
        <div class="profile-menu">
          <a class="profile-menu__item" href="/settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            {{ 'header.settings' | translate }}
          </a>
          <div class="profile-menu__divider"></div>
          <button class="profile-menu__item profile-menu__item--danger" (click)="logout()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            {{ 'header.signOut' | translate }}
          </button>
        </div>
      }
    </div>
  </div>
</header>
