<div class="task-board">
  <div class="task-board__header">
    <div>
      <h1 class="task-board__title">{{ 'tasks.board.title' | translate }}</h1>
      <p class="task-board__subtitle">{{ 'tasks.board.subtitle' | translate }}</p>
    </div>
    <div class="task-board__filters">
      <input
        type="text"
        class="sq-input task-board__search"
        [placeholder]="'tasks.board.searchPlaceholder' | translate"
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
      />
      <select class="sq-select" [ngModel]="filterPriority()" (ngModelChange)="filterPriority.set($event)">
        <option value="">{{ 'tasks.board.filter.allPriorities' | translate }}</option>
        <option value="CRITICAL">{{ 'tasks.priority.critical' | translate }}</option>
        <option value="HIGH">{{ 'tasks.priority.high' | translate }}</option>
        <option value="MEDIUM">{{ 'tasks.priority.medium' | translate }}</option>
        <option value="LOW">{{ 'tasks.priority.low' | translate }}</option>
      </select>
    </div>
  </div>

  <div class="board">
    @for (column of filteredColumns(); track column.state) {
      <div class="board__column">
        <div class="board__column-header">
          <div class="board__column-title">
            <span class="board__column-dot" [style.background]="column.color"></span>
            {{ column.label | translate }}
            <span class="board__column-count">{{ column.tasks.length }}</span>
          </div>
        </div>
        <div
          class="board__column-body"
          cdkDropList
          [id]="'drop-list-' + column.state"
          [cdkDropListData]="column.tasks"
          [cdkDropListConnectedTo]="connectedDropLists()"
          (cdkDropListDropped)="drop($event, column)"
        >
          @for (task of column.tasks; track task.id) {
            <div cdkDrag [cdkDragData]="task">
              <sq-task-card [task]="task" (cardClick)="openTask($event)" />
            </div>
          } @empty {
            <div class="board__empty">
              <p>{{ 'tasks.board.noTasks' | translate }}</p>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
